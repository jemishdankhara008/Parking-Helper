# Render Blueprint — deploy the FastAPI app (https://render.com/docs/blueprint-spec)
# Create service: New → Blueprint → Connect this repo, or paste this file in the dashboard.

services:
  - type: web
    name: parking-helper-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Frontend: https://smart-parking.streamlit.app — add localhost for local Streamlit dev
      - key: CORS_ORIGINS
        value: "https://smart-parking.streamlit.app,http://localhost:8501,http://127.0.0.1:8501"
      # Add LIVE_ADMIN_SECRET in the Render dashboard if you use protected /live routes
